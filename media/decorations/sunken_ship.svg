<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 130" width="240" height="130">
  <!-- hull -->
  <path d="M16 98 Q 28 74 66 70 L 196 66 Q 224 74 230 98 L 206 120 Q 116 130 38 120 Z" fill="#4e342e"/>
  <!-- upper deck band -->
  <path d="M66 70 L 196 66 Q 206 67 212 72 L 74 78 Q 68 74 66 70 Z" fill="#6d4c41"/>
  <!-- weathered plank lines -->
  <path d="M28 104 Q 120 112 214 102" stroke="#3a241a" stroke-width="2.5" fill="none" opacity="0.55"/>
  <path d="M40 114 Q 120 122 200 112" stroke="#3a241a" stroke-width="2.5" fill="none" opacity="0.45"/>
  <!-- hull breach -->
  <path d="M150 92 Q 168 80 188 90 Q 192 108 170 114 Q 150 110 150 92 Z" fill="#190d08"/>
  <!-- portholes -->
  <circle cx="92" cy="90" r="5.5" fill="#241509"/>
  <circle cx="92" cy="90" r="2.6" fill="#8fe0cb" opacity="0.55"/>
  <circle cx="118" cy="88" r="5.5" fill="#241509"/>
  <circle cx="118" cy="88" r="2.6" fill="#8fe0cb" opacity="0.55"/>
  <!-- broken main mast, snapped and leaning -->
  <path d="M118 68 L 104 14 L 112 12 L 128 68 Z" fill="#6d4c41"/>
  <!-- snapped-off top spar fallen across -->
  <path d="M106 20 L 60 38 L 62 46 L 110 28 Z" fill="#5a3a2a"/>
  <!-- tattered main sail -->
  <path d="M120 24 Q 166 30 168 64 Q 144 56 134 70 Q 128 52 116 52 Z" fill="#cabda4" opacity="0.85"/>
  <!-- crow's nest -->
  <rect x="100" y="22" width="20" height="6" rx="2" fill="#4e342e"/>
  <!-- foremast with small sail -->
  <rect x="182" y="36" width="7" height="32" fill="#6d4c41"/>
  <path d="M189 40 Q 218 46 218 64 Q 200 58 192 66 Z" fill="#cabda4" opacity="0.8"/>
</svg>
